<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему — Candy Cloud</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box { 
            max-width: 400px; margin: 100px auto; padding: 30px; 
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .login-btn { width: 100%; padding: 10px; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Админ-панель</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Логин" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit" class="login-btn">Войти</button>
        </form>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;"></p>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin.html';
                } else {
                    const err = document.getElementById('error-msg');
                    err.innerText = data.message;
                    err.style.display = 'block';
                }
            } catch (error) {
                alert('Ошибка сервера');
            }
        };
    </script>
</body>
</html>
