<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Cloud — Магазин сладостей</title>
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">Candy Cloud</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Главная</a></li>
                    
                    <li><a href="#">Каталог</a></li>
                    <li id="nav-profile-item">
                    <li><a href="profile.html" id="nav-login-link">Войти</a></li>
                </li>
                </ul>
            </nav>
           <div class="cart-icon" onclick="toggleModal()" style="cursor: pointer;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Самые свежие сладости с доставкой на дом</h1>
            <p>От Европейских круассанов до Восточного щербета</p>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title">Наш ассортимент</h2>
        <div id="product-grid" class="product-grid">
            
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Candy Cloud. Курсовая работа.</p>
    </footer>

    <script src="js/main.js"></script>
    <div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleModal()">&times;</span>
        <h2>Ваша корзина</h2>
        <div id="cart-items"></div>
        <div class="cart-total">
            Итого: <span id="total-price">0</span> ₽
        </div>
        <button class="order-btn" onclick="checkout()">Оформить заказ</button>
    </div>
</div>
</body>
</html>
